<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <!-- Fondo blanco -->
  <rect width="480" height="160" fill="white"/>
  
  <!-- Texto "Unilasallista" en azul oscuro institucional -->
  <text x="30" y="90" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="58" 
        font-weight="bold" 
        fill="#1a2a6e"
        letter-spacing="-1">Unilasallista</text>

  <!-- Estrella al lado del nombre -->
  <polygon points="420,18 426,38 447,38 430,50 437,70 420,58 403,70 410,50 393,38 414,38" 
           fill="#1a2a6e"/>

  <!-- Subtítulo "Corporación Universitaria" -->
  <text x="50" y="116" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="18" 
        fill="#1a2a6e"
        letter-spacing="0.5"
        text-anchor="start">Corporación Universitaria</text>

  <!-- Subtítulo secundario "Vigilada Mineducación" -->
  <text x="135" y="138" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="13" 
        fill="#555555"
        letter-spacing="0.3"
        text-anchor="start">Vigilada Mineducación</text>
</svg>
