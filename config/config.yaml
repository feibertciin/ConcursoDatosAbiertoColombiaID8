# Framework-ML-SNIES Configuration File

db:
  provider: "sqlite"
  database_name: "snies_permanencia.db"
  connection_uri: "sqlite:///snies_permanencia.db"

mlflow:
  tracking_uri: "sqlite:///mlflow.db"
  experiment_name: "Student_Permanence_Analysis"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  external_dir: "data/external"
  datasets:
    snies: "snies_matriculados.csv"
    dane: "dane_socioeconomico.csv"
    ole: "ole_graduados.csv"
    datos_abiertos: "colombia_datos_abiertos.csv"

features:
  categorical:
    - "genero"
    - "departamento_origen"
    - "estrato_socioeconomico"
    - "tipo_colegio"
    - "programa_academico"
  numerical:
    - "edad"
    - "puntaje_saber11"
    - "promedio_acumulado"
    - "materias_reprobadas"
    - "ingreso_familiar"
  target: "desertor"

model_params:
  random_forest:
    n_estimators: 100
    max_depth: 10
    random_state: 42
  xgboost:
    n_estimators: 150
    max_depth: 6
    learning_rate: 0.1
    random_state: 42
  lightgbm:
    n_estimators: 200
    learning_rate: 0.05
    random_state: 42
